<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lyra — Second Brain</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Animated background glowing blobs -->
    <div class="background-blobs">
        <div id="blob-1" class="blob"></div>
        <div id="blob-2" class="blob"></div>
        <div id="blob-3" class="blob"></div>
    </div>

    <!-- Draggable Floating Avatar Orb -->
    <div id="lyra-avatar" class="lyra-orb casual" title="Drag me anywhere! Click to talk.">
        <div class="orb-core"></div>
        <div class="orb-ring-1"></div>
        <div class="orb-ring-2"></div>
        <div class="orb-glow"></div>
        <!-- Tooltip that shows mood -->
        <span class="orb-tooltip" id="avatar-tooltip">Casual Mood</span>
    </div>

    <div class="app-container">
        <!-- Sidebar: Session History & Settings -->
        <aside class="sidebar glass">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-dot"></span>
                    <h1>LYRA</h1>
                </div>
                <span class="version-badge">v0.6</span>
            </div>

            <!-- New Chat Button -->
            <button id="btn-new-chat" class="new-chat-btn">
                <i class="fa-solid fa-plus"></i> New Conversation
            </button>

            <!-- Chat History List -->
            <div class="sidebar-section history-section">
                <h2>Recent chats</h2>
                <div id="chat-history-list" class="history-list">
                    <!-- History items injected by JS -->
                </div>
            </div>
            
            <!-- Sidebar Footer: Settings & Debug -->
            <div class="sidebar-footer glass-panel">
                <div class="debug-controls">
                    <button id="btn-debug" class="debug-toggle">
                        <i class="fa-solid fa-terminal"></i>
                        <span>Debug Mode: <b id="debug-state">OFF</b></span>
                    </button>
                    <div class="debug-actions hidden" id="debug-actions-pane">
                        <button id="btn-suggestions" class="debug-action-btn" title="View Suggestions">
                            <i class="fa-solid fa-lightbulb"></i> Suggestions
                        </button>
                        <button id="btn-errors" class="debug-action-btn" title="View Errors">
                            <i class="fa-solid fa-bug"></i> Error Log
                        </button>
                    </div>
                </div>
                <div class="system-meta">
                    <span>Second Brain AI</span>
                    <span id="model-indicator">LLaMA 3.3</span>
                </div>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main class="workspace">
            <!-- Centered Chat Container -->
            <section class="chat-container">
                <!-- Welcome View (Shown when chat is empty) -->
                <div id="welcome-view" class="welcome-screen">
                    <div class="welcome-content">
                        <h2>Hey Hardik.</h2>
                        <p>I'm Lyra, your second brain. What are we planning, building, or looking up today?</p>
                        <div class="quick-prompts">
                            <button class="prompt-card" data-prompt="What assignments do I have due this week?">
                                <h3>Classroom due dates</h3>
                                <p>Check Classroom assignments & study priorities</p>
                            </button>
                            <button class="prompt-card" data-prompt="Play some chill music on Spotify">
                                <h3>Play music</h3>
                                <p>Open Spotify and play tracks based on mood</p>
                            </button>
                            <button class="prompt-card" data-prompt="Run calculations for the projectile motion model">
                                <h3>Execute code</h3>
                                <p>Write and run sandboxed Python scripts</p>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Messages Area -->
                <div id="chat-messages" class="messages-area hidden">
                    <!-- Dynamic chat dialogue goes here -->
                </div>

                <!-- Input area -->
                <div class="input-wrapper glass">
                    <textarea id="chat-input" placeholder="Ask Lyra something..." rows="1"></textarea>
                    <div class="input-actions">
                        <button id="btn-mic" class="action-btn" title="Voice Input"><i class="fa-solid fa-microphone"></i></button>
                        <button id="btn-send" class="action-btn primary-btn" title="Send Message"><i class="fa-solid fa-arrow-up"></i></button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Modals for Suggestions / Errors -->
    <div id="modal-container" class="modal-overlay hidden">
        <div class="modal glass-panel">
            <div class="modal-header">
                <h3 id="modal-title">Details</h3>
                <button id="btn-close-modal" class="close-btn">&times;</button>
            </div>
            <div id="modal-body" class="modal-content">
                <!-- Content injected here -->
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
